<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SignUp</title>
</head>
<body>

     {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show " role="alert">
      <strong>Message:</strong> {{ message }}
      <button type="button" class="close" data-dissmiss="alert" aria-label="Close">
      <span aria-hidden="true">&times;</span>
      </button>
      </div>
     {% endfor %}

<h3>Sign Up</h3>

<form action="/signup" method="POST">
    {% csrf_token %}
    <label for=""> Username </label>
    <input type="text" id="username" name="username" placeholder="Create a Username (only letters and numbers)" Required></input>
    <br>
    <label for=""> First Name </label>
    <input type="text" id="fname" name="fname" placeholder="Enter Your First Name:" Required></input>
    <br>
    <label for=""> Last Name </label>
    <input type="text" id="lname" name="lname" placeholder="Enter Your Last Name Name:" Required></input>
    <br>
    <label for=""> Email Address </label>
    <input type="email" id="email" name="email" placeholder="Enter Your Email Address:" Required></input>
    <br>
    <label for=""> Password </label>
    <input type="password" id="pass1" name="pass1" placeholder="Create a Password: " Required> </input>
    <br>
    <label for=""> Confirm Your Password </label>
    <input type="password" id="pass2" name="pass2" placeholder="Confirm Your Password:" Required> </input>

<br>

<button type="submit"> Sign Up </button>
<br>
</form>

</body>
</html>
